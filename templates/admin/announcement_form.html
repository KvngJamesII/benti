{% extends "base.html" %}
{% block title %}{{ 'Edit' if announcement else 'New' }} Announcement – Eden SMS{% endblock %}

{% block content %}
<h4 class="mb-4">
    <i class="bi bi-megaphone text-eden"></i>
    {{ 'Edit Announcement' if announcement else 'New Announcement' }}
</h4>

<div class="card eden-card" style="max-width: 640px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" required
                       placeholder="e.g. System Maintenance Tonight"
                       value="{{ announcement.title if announcement else '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Body</label>
                <textarea name="body" class="form-control" rows="4" required
                          placeholder="Write your announcement message here...">{{ announcement.body if announcement else '' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Style</label>
                <select name="variant" class="form-select">
                    {% set selected_variant = announcement.variant if announcement else 'info' %}
                    <option value="info" {{ 'selected' if selected_variant == 'info' }}>Info (Blue)</option>
                    <option value="warning" {{ 'selected' if selected_variant == 'warning' }}>Warning (Yellow)</option>
                    <option value="success" {{ 'selected' if selected_variant == 'success' }}>Success (Green)</option>
                    <option value="danger" {{ 'selected' if selected_variant == 'danger' }}>Danger (Red)</option>
                </select>
            </div>

            {% if announcement %}
            <div class="mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
                           {{ 'checked' if announcement.is_active }}>
                    <label class="form-check-label" for="isActive">Active (visible to users)</label>
                </div>
            </div>
            {% endif %}

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-eden">
                    <i class="bi bi-check-lg me-1"></i>{{ 'Update' if announcement else 'Create' }}
                </button>
                <a href="{{ url_for('admin.announcements') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
