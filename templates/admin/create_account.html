{% extends "base.html" %}
{% block title %}Create Account – Admin – Eden SMS{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-person-plus text-eden"></i> Create Account</h4>

<div class="row">
    <div class="col-lg-6">
        <div class="card eden-card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Account Type</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleUser" value="user" checked>
                                <label class="form-check-label" for="roleUser">
                                    <i class="bi bi-person"></i> User Account
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleMod" value="mod">
                                <label class="form-check-label" for="roleMod">
                                    <i class="bi bi-shield-check"></i> Mod Account
                                </label>
                            </div>
                            {% if is_super_admin %}
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin">
                                <label class="form-check-label" for="roleAdmin">
                                    <i class="bi bi-shield-lock"></i> Admin Account
                                </label>
                            </div>
                            {% endif %}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="user_id" class="form-label">User ID</label>
                        <input type="text" class="form-control" id="user_id" name="user_id"
                               placeholder="Enter a unique User ID" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="text" class="form-control" id="password" name="password"
                               placeholder="Enter a password" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-eden">
                            <i class="bi bi-check-lg"></i> Create Account
                        </button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
